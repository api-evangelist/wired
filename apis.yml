apis:
  - aid: wired:rss-feed
    name: Wired RSS Feed
    description: >-
      Wired provides RSS feeds for its main content stream and individual topic
      categories including Business, Science, Security, Politics, Gear, Ideas,
      Culture, and AI. These standard RSS feeds allow developers and readers to
      consume Wired content programmatically using any feed parsing library or
      RSS reader tool.
    humanURL: https://www.wired.com/feed/rss
    baseURL: https://www.wired.com
    tags:
      - RSS
      - News
      - Feed
      - Syndication
    properties:
      - type: Documentation
        url: https://www.wired.com/feed/rss
      - type: RSSFeed
        url: https://www.wired.com/feed/rss
